---
- name: Configure Proxy Nodes (Keepalived + HAProxy)
  hosts: proxy
  become: yes
  tasks:
    - name: Update apt cache
      shell: apt-get update
      changed_when: false

    - name: Install Keepalived and HAProxy
      package:
        name:
          - keepalived
          - haproxy
        state: present

    # --- Настройка Keepalived ---
    - name: Configure Keepalived
      copy:
        dest: /etc/keepalived/keepalived.conf
        content: |
          vrrp_instance VI_1 {
              state {{ 'MASTER' if inventory_hostname == 'ha1-cod' else 'BACKUP' }}
              interface ens18
              virtual_router_id {{ 51 if inventory_hostname == 'ha1-cod' else 52 }}
              priority {{ 100 if inventory_hostname == 'ha1-cod' else 50 }}
              advert_int 1
              virtual_ipaddress {
                  172.16.1.253/23
              }
          }
      notify: Restart keepalived

    - name: Добавление dns-сервера
      ansible.builtin.lineinfile:
        path: /etc/net/ifaces/ens18/resolv.conf
        line: "nameserver 10.1.1.10"
        create: yes
        mode: '0644'
        
    - name: Ensure certs directory exists
      ansible.builtin.file:
        path: /etc/haproxy/certs
        state: directory
        mode: '0700'
    # --- Настройка HAProxy ---
    - name: Ensure group "haproxy" exists
      ansible.builtin.group:
        name: haproxy
        state: present
        system: yes

    - name: Ensure user "haproxy" exists
      ansible.builtin.user:
        name: haproxy
        group: haproxy
        state: present
        system: yes
        shell: /bin/false
        create_home: no
        home: /var/lib/haproxy

    - name: Configure HAProxy
      copy:
        dest: /etc/haproxy/haproxy.cfg
        content: |
          global
              daemon
              user haproxy
              group haproxy
              chroot /var/lib/haproxy
              log /dev/log local0
              ssl-default-bind-ciphers PROFILE=SYSTEM

          defaults
              mode http
              log global
              option httplog
              timeout connect 5000ms
              timeout client 50000ms
              timeout server 50000ms

          # 1. Основной HTTP сайт (Порт 80) -> Редирект на HTTPS (443)
          frontend http_front
              bind 172.16.1.253:80
              http-request redirect scheme https code 301 unless { ssl_fc }

          # 2. Основной HTTPS сайт (Порт 443)
          frontend https_front
              bind 172.16.1.253:443 ssl crt /etc/haproxy/certs/haproxy.pem
              option forwardfor
              http-request set-header X-Forwarded-Proto https
              default_backend web_servers

          # 3. Выделенный порт статистики (Порт 9000) с поддержкой SSL и Редиректа
          listen stats
              bind 172.16.1.253:9000 ssl crt /etc/haproxy/certs/haproxy.pem
              mode http
              # Авто-редирект на HTTPS, если эксперт ввёл http://...:9000
              http-request redirect scheme https code 301 unless { ssl_fc }
              
              stats enable
              stats uri /haproxy_stats
              stats refresh 5s

      notify: Restart haproxy
      
    - name: copy certificate
      copy:
        src: /home/user/rootCA.crt
        dest: /etc/pki/ca-trust/source/anchors/rootCA.crt
        owner: root
        group: root
        mode: 0644
    - name: Update certs
      shell: update-ca-trust


    - name: Ensure services are started
      service:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - keepalived
        - haproxy

  handlers:
    - name: Restart keepalived
      service:
        name: keepalived
        state: restarted

    - name: Restart haproxy
      service:
        name: haproxy
        state: restarted
